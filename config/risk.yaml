risk:
  blacklist:
    delist_organizing: true
    major_investigation: true
    severe_audit_non_standard: true
    st: true
  extreme_scenarios:
    index_crash_plus_breadth_collapse:
      action: reduce_to_30_pct
      breadth_threshold: 0.3
      index_drop_pct: 3
    northbound_outflow_plus_high_vol:
      action: reduce_to_30_pct
      outflow_threshold: 5000000000
      vol_percentile: 75
    vix_spike:
      action: reduce_to_60_pct
      percentile: 95
  penalty_rules:
    cashflow_quality:
      threshold: 0.5
      weight: 0.1
    earnings_warning:
      weight: 0.15
    goodwill_ratio:
      threshold: 0.5
      weight: 0.15
    inquiry_frequency:
      weight: 0.2
      window_days: 60
    pledge_ratio:
      threshold: 0.5
      weight: 0.1
    reduction_density:
      threshold: 0.01
      weight: 0.1
      window_days: 30
  portfolio_risk:
    crowding_threshold: 0.4
    max_drawdown: 0.15
    max_industry_deviation: 0.05
    max_portfolio_vol: 0.25
    max_single_position: 0.03
    max_turnover: 8.0
