# 模型配置 V2
model:
  # ML参数
  ridge:
    alpha: 3.0

  lightgbm:
    learning_rate: 0.03
    max_depth: 4
    num_leaves: 31
    min_child_samples: 200
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

  # 三路融合权重
  fusion_weights:
    rule: 0.30
    ridge: 0.25
    lightgbm: 0.45

  # 动态权重收缩
  shrinkage:
    base_ratio: 0.70
    min_weight: 0.10
    max_weight: 0.45

  # Walk-Forward参数
  walk_forward:
    train_window_months: 36
    test_window_months: 12
    step_months: 1
    gap_days: 21