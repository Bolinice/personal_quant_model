# 择时配置 V2
timing:
  # 5信号权重
  signals:
    trend: 1.0
    breadth: 1.0
    volatility: 1.0
    northbound: 1.0
    drawdown: 1.0

  # 4档仓位
  position_tiers:
    strong_positive: 1.00
    positive: 0.80
    neutral: 0.60
    negative: 0.30

  # 回撤保护阈值
  drawdown_protection:
    level1: 0.05   # >5% 降一档
    level2: 0.08   # >8% 再降一档
    level3: 0.12   # >12% 最低30%

  # 恢复阈值
  recovery_threshold: 0.03