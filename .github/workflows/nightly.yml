name: Nightly

on:
  schedule:
    - cron: "37 2 * * *"  # 每日 02:37 UTC
  workflow_dispatch:

jobs:
  full-backtest-validation:
    name: Full Backtest Validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run all tests including slow
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quant_test
        run: pytest tests/ --timeout=120 -v

      - name: Statistical invariant tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quant_test
        run: pytest tests/ -m backtest --timeout=300 -v || true
        continue-on-error: true

  performance-benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run performance tests
        run: pytest tests/test_performance.py -v --timeout=300 || true
        continue-on-error: true
